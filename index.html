<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE+ Financial Projection</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.active {
  background: #378ADD;
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: right;
}

th:first-child, td:first-child {
  text-align: left;
}

.pos { color: green; font-weight: bold; }
.neg { color: red; font-weight: bold; }

</style>
</head>

<body>

<div class="container">

<h1>VIBE+ Cash Flow (12 Months)</h1>

<div class="card">
  <button onclick="setScenario('worst', this)">Worst</button>
  <button onclick="setScenario('expected', this)" class="active">Expected</button>
  <button onclick="setScenario('best', this)">Best</button>
</div>

<div class="card">
  <p><b>Startup Cost:</b> 146,545,000 ₫</p>
  <p><b>Break-even Month:</b> <span id="bep"></span></p>
  <p><b>Final Profit:</b> <span id="final"></span></p>
</div>

<div class="card">
  <canvas id="chart" height="100"></canvas>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Month</th>
<th>Packs</th>
<th>Revenue</th>
<th>Cost</th>
<th>Profit</th>
<th>Cumulative</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// ================= DATA =================
const scenarios = {

expected: {
months: [
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-131245000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-115945000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-100645000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-85345000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-70045000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-54745000},
{packs:390, revenue:58500000, cost:41850000, profit:17550000, cum:-38095000},
{packs:390, revenue:58500000, cost:41850000, profit:17550000, cum:-21445000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:-6145000},
{packs:390, revenue:58500000, cost:41850000, profit:17550000, cum:10505000},
{packs:390, revenue:58500000, cost:41850000, profit:17550000, cum:27155000},
{packs:360, revenue:54000000, cost:38700000, profit:16200000, cum:42455000}
]
},

worst: {
months: [
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-134000000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-121400000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-108800000},
{packs:270, revenue:40500000, cost:29700000, profit:10800000, cum:-98000000},
{packs:270, revenue:40500000, cost:29700000, profit:10800000, cum:-87200000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-74600000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-62000000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-49400000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-36800000},
{packs:270, revenue:40500000, cost:29700000, profit:10800000, cum:-26000000},
{packs:270, revenue:40500000, cost:29700000, profit:10800000, cum:-15200000},
{packs:300, revenue:45000000, cost:32400000, profit:12600000, cum:-2600000}
]
},

best: {
months: [
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:-128000000},
{packs:450, revenue:67500000, cost:48000000, profit:19500000, cum:-108500000},
{packs:480, revenue:72000000, cost:51000000, profit:21000000, cum:-87500000},
{packs:480, revenue:72000000, cost:51000000, profit:21000000, cum:-66500000},
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:-48500000},
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:-30500000},
{packs:480, revenue:72000000, cost:51000000, profit:21000000, cum:-9500000},
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:8500000},
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:26500000},
{packs:420, revenue:63000000, cost:45000000, profit:18000000, cum:44500000},
{packs:450, revenue:67500000, cost:48000000, profit:19500000, cum:64000000},
{packs:480, revenue:72000000, cost:51000000, profit:21000000, cum:85000000}
]
}

};

// ================= FUNCTIONS =================

function fmt(n){
  return n.toLocaleString() + " ₫";
}

function findBEP(months){
  for(let i=0;i<months.length;i++){
    if(months[i].cum >= 0) return i+1;
  }
  return ">12";
}

function render(sc){

  let data = scenarios[sc].months;

  // metrics
  document.getElementById("bep").innerText = "Month " + findBEP(data);

  let final = data[data.length-1].cum;
  let el = document.getElementById("final");
  el.innerText = fmt(final);
  el.className = final>=0 ? "pos" : "neg";

  // table
  let html="";
  data.forEach((m,i)=>{
    html+=`
    <tr>
      <td>M${i+1}</td>
      <td>${m.packs}</td>
      <td>${fmt(m.revenue)}</td>
      <td>${fmt(m.cost)}</td>
      <td class="${m.profit>=0?'pos':'neg'}">${fmt(m.profit)}</td>
      <td class="${m.cum>=0?'pos':'neg'}">${fmt(m.cum)}</td>
    </tr>`;
  });
  document.getElementById("table").innerHTML = html;

  // chart
  let ctx = document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:data.map((_,i)=>"M"+(i+1)),
      datasets:[
        {label:"Revenue", data:data.map(x=>x.revenue/1e6)},
        {label:"Cost", data:data.map(x=>x.cost/1e6)},
        {label:"Profit", data:data.map(x=>x.profit/1e6)},
        {label:"Cumulative", data:data.map(x=>x.cum/1e6)}
      ]
    }
  });
}

function setScenario(sc,btn){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render(sc);
}

// init
render("expected");

</script>

</body>
</html>
